<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SPK Indosat{% endblock %} — PT Indosat Ooredoo Hutchison</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-brand">
        <img src="{{ url_for('static', filename='img/logo_indosat.png') }}" alt="Indosat Ooredoo Hutchison">
    </div>
    <div class="sidebar-color-bar"></div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">Menu Utama</div>
        <a href="{{ url_for('main.index') }}"
           class="sidebar-link {% if request.endpoint == 'main.index' %}active{% endif %}">
            <i class="bi bi-house-fill"></i><span>Dashboard</span>
        </a>
        <a href="{{ url_for('data.index') }}"
           class="sidebar-link {% if request.blueprint == 'data' %}active{% endif %}">
            <i class="bi bi-table"></i><span>Data Project</span>
        </a>

        <div class="nav-section-label">Analisis</div>
        <a href="{{ url_for('spk.index') }}"
           class="sidebar-link {% if request.blueprint == 'spk' %}active{% endif %}">
            <i class="bi bi-calculator-fill"></i><span>Perhitungan SPK</span>
        </a>
        <a href="{{ url_for('ml.index') }}"
           class="sidebar-link {% if request.blueprint == 'ml' %}active{% endif %}">
            <i class="bi bi-cpu-fill"></i><span>Prediksi ML</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <small>Kelompok 4 &nbsp;·&nbsp; 2025</small>
    </div>
</aside>

<!-- TOPBAR -->
<header class="topbar">
    <div class="topbar-title">{% block page_title %}<span>Dashboard</span>{% endblock %}</div>
    <div class="topbar-badge">
        <img src="{{ url_for('static', filename='img/logo_indosat.png') }}" alt="Indosat">
        PT Indosat Ooredoo Hutchison
    </div>
</header>

<!-- MAIN -->
<main class="main-content">{% block content %}{% endblock %}</main>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
